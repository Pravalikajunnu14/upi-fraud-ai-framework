services:
  - type: web
    name: upi-fraud-dashboard
    runtime: python311
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && python app.py
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ALERT_EMAIL_FROM
        value: pravalikajunnu14@gmail.com
      - key: ALERT_EMAIL_PASSWORD
        sync: false
      - key: ALERT_EMAIL_TO
        value: pravalikajunnu14@gmail.com
      - key: ALLOWED_ORIGINS
        value: https://upi-fraud-dashboard.onrender.com
